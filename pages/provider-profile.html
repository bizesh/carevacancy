<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Provider Profile — CareVacancy</title>
<link rel="stylesheet" href="../css/global.css"/>
<link rel="stylesheet" href="../css/nav.css"/>
<style>
.profile-page{max-width:1100px;margin:0 auto;padding:28px 5%;display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;}
.profile-header{background:white;border-radius:14px;padding:28px;margin-bottom:20px;border:1px solid var(--border);}
.ph-top{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;}
.ph-avatar{width:72px;height:72px;border-radius:16px;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:28px;color:var(--teal-dark);flex-shrink:0;}
.ph-info{flex:1;}
.ph-name{font-family:'DM Serif Display',serif;font-size:26px;color:var(--navy);margin-bottom:4px;}
.ph-type{font-size:14px;color:var(--muted);margin-bottom:8px;}
.ph-badges{display:flex;gap:6px;flex-wrap:wrap;}
.ph-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.phb-verified{background:#dcfce7;color:#15803d;}
.phb-featured{background:#E1F5EE;color:#085041;}
.phb-premium{background:#ede9fe;color:#5b21b6;}
.ph-meta{display:flex;gap:20px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border);}
.ph-meta-item{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.profile-section{background:white;border-radius:14px;padding:24px;margin-bottom:16px;border:1px solid var(--border);}
.ps-title{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.ps-body{font-size:14px;color:var(--muted);line-height:1.7;}
.tag-cloud{display:flex;flex-wrap:wrap;gap:8px;}
.tag{font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;background:var(--bg);color:var(--text);border:1px solid var(--border);}
.vacancy-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.vc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.vc-title{font-size:14px;font-weight:600;color:var(--navy);}
.vc-available{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.va-immediate{background:#dcfce7;color:#15803d;}
.va-soon{background:#fef3c7;color:#92400e;}
.va-waitlist{background:#f1f5f9;color:#475569;}
.vc-meta{display:flex;gap:14px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
.contact-card{background:white;border:1px solid var(--border);border-radius:14px;padding:24px;position:sticky;top:88px;}
.cc-title{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:16px;}
.cc-tier{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:16px;font-size:13px;font-weight:500;color:var(--navy);}
.enquiry-form{display:flex;flex-direction:column;gap:12px;}
.enquiry-form select,.enquiry-form textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;background:white;}
.enquiry-form select:focus,.enquiry-form textarea:focus{border-color:var(--teal);}
.enquiry-form textarea{resize:vertical;min-height:100px;}
.contact-pref-label{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:4px;}
.contact-pref-options{display:flex;gap:8px;flex-wrap:wrap;}
.contact-pref-btn{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:white;color:var(--text);transition:all 0.15s;text-align:center;white-space:nowrap;}
.contact-pref-btn.active{border-color:var(--teal);background:var(--teal-light);color:var(--teal-dark);}
.enquiry-btn{background:var(--teal);color:white;border:none;padding:12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:100%;}
.enquiry-btn:hover{background:var(--teal-dark);}
.locked-msg{background:var(--bg);border:1px dashed var(--border);border-radius:8px;padding:16px;text-align:center;}
.locked-msg p{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.6;}
.save-btn{width:100%;background:none;border:1.5px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;}
.save-btn:hover{border-color:var(--teal);color:var(--teal);}
.loading-profile{text-align:center;padding:80px 20px;grid-column:1/-1;}
@media(max-width:900px){.profile-page{grid-template-columns:1fr;}.contact-card{position:static;}}
@media(max-width:600px){.profile-page{padding:16px 4%;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
</head>
<body>

<nav id="cv-nav">
  <a class="nav-logo" href="../index.html">Care<span>Vacancy</span></a>
  <div class="nav-links"><a href="search.html">← Back to search</a></div>
  <div class="nav-actions" id="nav-actions"></div>
</nav>

<div style="background:var(--bg);min-height:calc(100vh - 64px);padding-top:8px;">
<div class="profile-page" id="profile-page">
  <div class="loading-profile">
    <div style="font-size:32px;margin-bottom:12px;">⏳</div>
    <div style="font-size:15px;color:var(--muted);">Loading profile...</div>
  </div>
</div>
</div>

<script src="../js/nav.js"></script>
<script>
let profileData = null;
let selectedContactPref = 'either';

document.addEventListener('DOMContentLoaded', async () => {
  document.body.style.visibility = 'visible';
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { window.location.href = 'search.html'; return; }
  const user = await CV.getCurrentUser();
  await loadProfile(id, user);
  if (user) {
    await CV.db.from('profile_views').insert({ profile_id: id, viewer_id: user.id || null });
  }
});

async function loadProfile(id, user) {
  try {
    const { data: p, error } = await CV.db.from('profiles').select('*').eq('id', id).eq('status','active').single();
    if (error || !p) {
      document.getElementById('profile-page').innerHTML = '<div class="loading-profile"><div style="font-size:48px;">🔍</div><div style="font-size:16px;color:var(--navy);font-weight:500;margin-top:12px;">Provider not found</div><a href="search.html" style="color:var(--teal);">Back to search</a></div>';
      return;
    }
    profileData = p;
    document.title = (p.org_name || p.full_name) + ' — CareVacancy';
    
    // Auth gate logic
    const isLoggedIn = !!user;
    const userTier = user?.profile?.tier || 'basic';
    const hasFullAccess = isLoggedIn && userTier !== 'basic';
    const isOwnProfile = user && user.id === p.id;
    window._profileAccess = { isLoggedIn, hasFullAccess, isOwnProfile };
    const { data: posts } = await CV.db.from('posts').select('*').eq('user_id', id).eq('is_active', true).order('created_at', { ascending: false });
    renderProfile(p, posts || []);
  } catch(e) { console.error(e); }
}

function renderProfile(p, posts) {
  const initials = (p.org_name || p.full_name || '?').slice(0,2).toUpperCase();
  const name = p.org_name || p.full_name || 'Provider';
  const roleLabels = { org:'SIL/SDA Organisation', sc:'Support Coordinator', pm:'Plan Manager', allied:'Allied Health Professional' };
  const location = [p.suburb, p.state].filter(Boolean).join(', ') || 'Location not specified';
  const canReceiveEnquiries = ['featured','premium'].includes(p.tier);
  const vacancyPosts = posts.filter(post => post.type === 'offering');
  const seekingPosts = posts.filter(post => post.type === 'seeking');

  document.getElementById('profile-page').innerHTML = `
  <div>
    <div class="profile-header">
      <div class="ph-top">
        <div class="ph-avatar">${initials}</div>
        <div class="ph-info">
          <div class="ph-name">${name}</div>
          <div class="ph-type">${roleLabels[p.role] || p.role}</div>
          <div class="ph-badges">
            <span class="ph-badge phb-verified">✓ Verified by CareVacancy</span>
            ${p.tier === 'premium' ? '<span class="ph-badge phb-premium">💎 Premium</span>' : p.tier === 'featured' ? '<span class="ph-badge phb-featured">⭐ Featured</span>' : ''}
          </div>
        </div>
      </div>
      <div class="ph-meta">
        <div class="ph-meta-item">📍 ${location}</div>
        ${p.website ? `<div class="ph-meta-item">🌐 <a href="${p.website}" target="_blank" style="color:var(--teal);">${p.website.replace('https://','').replace('http://','')}</a></div>` : ''}
        ${p.ndis_registration ? `<div class="ph-meta-item">✓ NDIS Registered</div>` : ''}
        ${p.ahpra_number ? `<div class="ph-meta-item">✓ AHPRA Registered</div>` : ''}
      </div>
    </div>

    ${p.bio ? `<div class="profile-section"><div class="ps-title">About</div><div class="ps-body">${p.bio}</div></div>` : ''}

    ${p.services?.length > 0 ? `
    <div class="profile-section">
      <div class="ps-title">Services offered</div>
      <div class="tag-cloud">${p.services.map(s => `<span class="tag">${s}</span>`).join('')}</div>
    </div>` : ''}

    ${p.disability_types?.length > 0 ? `
    <div class="profile-section">
      <div class="ps-title">Disability types supported</div>
      <div class="tag-cloud">${p.disability_types.map(d => `<span class="tag">${d}</span>`).join('')}</div>
    </div>` : ''}

    ${vacancyPosts.length > 0 ? `
    <div class="profile-section">
      <div class="ps-title">Current vacancies &amp; offerings (${vacancyPosts.length})</div>
      ${vacancyPosts.map(post => `
      <div class="vacancy-card">
        <div class="vc-top">
          <div class="vc-title">${post.title}</div>
          <span class="vc-available ${post.availability === 'immediate' ? 'va-immediate' : post.availability === 'waitlist' ? 'va-waitlist' : 'va-soon'}">
            ${post.availability === 'immediate' ? '✓ Available now' : post.availability === 'waitlist' ? 'Waitlist' : 'Available soon'}
          </span>
        </div>
        ${post.description ? `<p style="font-size:13px;color:var(--muted);margin:6px 0 8px;line-height:1.6;">${post.description}</p>` : ''}
        <div class="vc-meta">
          ${post.suburb ? `<span>📍 ${post.suburb}, ${post.state || ''}</span>` : ''}
          ${post.support_level ? `<span>Support: ${post.support_level}</span>` : ''}
          ${post.vacancy_count > 0 ? `<span>🏠 ${post.vacancy_count} spot${post.vacancy_count > 1 ? 's' : ''} available</span>` : ''}
        </div>
      </div>`).join('')}
    </div>` : ''}

    ${seekingPosts.length > 0 ? `
    <div class="profile-section">
      <div class="ps-title">Currently seeking (${seekingPosts.length})</div>
      ${seekingPosts.map(post => `
      <div class="vacancy-card">
        <div class="vc-top"><div class="vc-title">${post.title}</div><span class="vc-available va-soon">Seeking</span></div>
        ${post.description ? `<p style="font-size:13px;color:var(--muted);margin:6px 0 8px;line-height:1.6;">${post.description}</p>` : ''}
      </div>`).join('')}
    </div>` : ''}
  </div>

  <div>
    <div class="contact-card">
      <div class="cc-title">Contact ${name.split(' ')[0]}</div>
      ${p.tier === 'premium' ? '<div class="cc-tier">💎 Premium provider — responds quickly</div>' : p.tier === 'featured' ? '<div class="cc-tier">⭐ Featured provider</div>' : ''}

      ${canReceiveEnquiries ? `
      <div class="enquiry-form" id="enquiry-form">
        <select id="enq-subject">
          <option value="">What is your enquiry about?</option>
          <option>SIL vacancy availability</option>
          <option>Service availability</option>
          <option>Referral for a client</option>
          <option>General enquiry</option>
          <option>Other</option>
        </select>
        <textarea id="enq-message" placeholder="Hi, I'm enquiring about..."></textarea>
        <div>
          <div class="contact-pref-label">How would you like to be contacted back?</div>
          <div class="contact-pref-options">
            <button class="contact-pref-btn" onclick="setContactPref('email',this)">📧 Email</button>
            <button class="contact-pref-btn" onclick="setContactPref('phone',this)">📞 Phone</button>
            <button class="contact-pref-btn active" onclick="setContactPref('either',this)">✓ Either</button>
          </div>
        </div>
        <button class="enquiry-btn" onclick="sendEnquiry('${p.id}')">Send enquiry</button>
        <div style="font-size:11px;color:var(--muted);text-align:center;">Your message goes directly to this provider via CareVacancy</div>
      </div>
      <div id="enquiry-sent" style="display:none;text-align:center;padding:16px;background:#f0fdf4;border-radius:8px;">
        <div style="font-size:24px;margin-bottom:8px;">✓</div>
        <div style="font-size:14px;font-weight:600;color:#15803d;">Enquiry sent!</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">The provider will be in touch soon.</div>
      </div>
      ` : `
      <div class="locked-msg">
        <p>This provider is on the Basic plan and cannot receive direct enquiries.</p>
        ${p.website ? `<a href="${p.website}" target="_blank" style="color:var(--teal);font-size:13px;display:block;margin-top:8px;">Visit their website →</a>` : ''}
      </div>
      `}

      <button class="save-btn" onclick="saveProvider('${p.id}')">♡ Save to shortlist</button>
      <a href="search.html" style="display:block;text-align:center;font-size:12px;color:var(--muted);margin-top:12px;text-decoration:none;">← Back to search results</a>
    </div>
  </div>`;
}

function setContactPref(pref, btn) {
  selectedContactPref = pref;
  document.querySelectorAll('.contact-pref-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function sendEnquiry(toId) {
  const user = await CV.getCurrentUser();
  if (!user) {
    window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
    return;
  }
  const subject = document.getElementById('enq-subject').value;
  const message = document.getElementById('enq-message').value.trim();
  if (!message) { alert('Please enter a message.'); return; }

  try {
    const { data: enqData, error: enqError } = await CV.db.from('enquiries').insert({
      from_user_id: user.id,
      to_user_id: toId,
      subject: subject || 'General enquiry',
      message: CV.sanitise(message),
      contact_preference: selectedContactPref,
      status: 'sent'
    }).select().single();

    if (enqError) throw enqError;

    fetch('/api/notify-enquiry', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enquiryId: enqData.id })
    }).catch(e => console.error('Email notify error:', e));

    document.getElementById('enquiry-form').style.display = 'none';
    document.getElementById('enquiry-sent').style.display = 'block';
  } catch(e) {
    alert('Could not send enquiry: ' + e.message);
  }
}

async function saveProvider(providerId) {
  const user = await CV.getCurrentUser();
  if (!user) { window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href); return; }
  try {
    await CV.db.from('saved_providers').insert({ user_id: user.id, provider_id: providerId });
    alert('Saved to your shortlist ✓');
  } catch(e) {
    if (e.message?.includes('unique')) alert('Already in your shortlist!');
  }
}
</script>

<!-- AUTH GATE MODAL -->
<div id="profile-gate-modal" style="display:none;position:fixed;inset:0;background:rgba(15,41,66,0.75);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px;">
  <div style="background:white;border-radius:20px;padding:36px;max-width:400px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.25);animation:fadeIn 0.25s ease;position:relative;">
    <button onclick="document.getElementById('profile-gate-modal').style.display='none'" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;">&#215;</button>
    <div id="gate-icon" style="font-size:36px;margin-bottom:14px;">&#128274;</div>
    <h3 id="gate-title" style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);margin-bottom:8px;">Log in to view &amp; enquire</h3>
    <p id="gate-body" style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px;">Create a free account or log in to view full provider details and send enquiries.</p>
    <a id="gate-primary-btn" href="login.html" style="display:block;width:100%;background:var(--teal);color:white;border:none;padding:13px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:9px;text-decoration:none;text-align:center;transition:background 0.2s;">&#128640; Create free account</a>
    <a id="gate-secondary-btn" href="login.html" style="display:block;width:100%;background:var(--bg);color:var(--navy);border:1.5px solid var(--border);padding:11px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;">Log in &#8594;</a>
  </div>
</div>

<script>
function checkAccessThenEnquire() {
  const access = window._profileAccess || {};
  if (!access.isLoggedIn) {
    document.getElementById('gate-icon').textContent = '\uD83D\uDD12';
    document.getElementById('gate-title').textContent = 'Log in to send an enquiry';
    document.getElementById('gate-body').textContent = 'Create a free account or log in to contact this provider directly.';
    document.getElementById('gate-primary-btn').href = 'signup.html';
    document.getElementById('gate-primary-btn').textContent = '\uD83D\uDE80 Create free account';
    document.getElementById('gate-secondary-btn').href = 'login.html';
    document.getElementById('gate-secondary-btn').textContent = 'Log in \u2192';
    document.getElementById('profile-gate-modal').style.display = 'flex';
    return;
  }
  if (!access.hasFullAccess && !access.isOwnProfile) {
    document.getElementById('gate-icon').textContent = '\u2B50';
    document.getElementById('gate-title').textContent = 'Upgrade to enquire';
    document.getElementById('gate-body').textContent = 'You\'re on the Basic plan. Upgrade to Featured ($49/mo) to send enquiries and contact providers directly.';
    document.getElementById('gate-primary-btn').href = '../pages/upgrade.html';
    document.getElementById('gate-primary-btn').textContent = '\u2B50 Upgrade to Featured \u2192';
    document.getElementById('gate-secondary-btn').onclick = function() { document.getElementById('profile-gate-modal').style.display='none'; };
    document.getElementById('gate-secondary-btn').href = '#';
    document.getElementById('gate-secondary-btn').textContent = 'Continue browsing';
    document.getElementById('profile-gate-modal').style.display = 'flex';
    return;
  }
  sendEnquiry();
}
</script>

</body>
</html>
